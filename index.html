<!DOCTYPE html>
<html>
<head>
    <title>Hide and Show in jQuery</title>

    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: 'Segoe UI', sans-serif;
            background-color:#0f2027;
            background-image:
                linear-gradient(rgba(0,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .card{
            width:380px;
            padding:35px;
            border-radius:15px;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 25px #00ffff;
            text-align:center;
            color:#00ffff;
            border:1px solid #00ffff;
        }

        .card h2{
            margin-bottom:20px;
            letter-spacing:2px;
            text-transform:uppercase;
        }

        img{
            width:180px;
            height:180px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            margin-bottom:20px;
            cursor:pointer;
        }

        .info{
            text-align:left;
            margin-top:15px;
        }

        .info p{
            margin:10px 0;
            font-size:16px;
        }

        .label{
            color:#ffffff;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <div class="card">
        
     <div class="profile">
    <img id="profilePic" src="prumon.jpg" alt="Profile Picture">
    <div id="placeholder" style="width:180px;height:180px;display:none;"></div>
</div>

        <h2>Student Profile</h2>

    
        <div class="info">
            <p><span class="label">ID Number:</span> 2025-10128</p>
            <p><span class="label">Firstname:</span> Rea Jane</p>
            <p><span class="label">Lastname:</span> Prumon</p>
            <p><span class="label">Course:</span> MSIT</p>
            <p><span class="label">Year:</span> 1st Year</p>
        </div>

    </div>

<script>
$(document).ready(function(){

    $("#profilePic").mouseenter(function(){
        $(this).hide();
    });

    $(".card").mouseleave(function(){
        $("#profilePic").show();
    });

});
</script>

</body>
</html>
